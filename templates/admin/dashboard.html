{% extends "admin/base.html" %} 
{% block content %}
<div class="container-fluid px-4">
  <h1 class="mt-4">Dashboard</h1>
  <ol class="breadcrumb mb-4">
    <li class="breadcrumb-item active">Thống kê</li>
  </ol>
  <div class="row">
    <div class="col-xl-6 col-md-6">
      <div class="card bg-primary text-white mb-4">
        <div class="card-body">Vocabulary ({{ vocab_count }})</div>
        <div class="card-footer d-flex align-items-center justify-content-between">
          <a class="small text-white stretched-link" href="/admin/vocabulary">View Details</a>
          <div class="small text-white"><i class="fas fa-angle-right"></i></div>
        </div>
      </div>
    </div>
    <div class="col-xl-6 col-md-6">
      <div class="card bg-danger text-white mb-4">
        <div class="card-body">Topic ({{ topic_count }})</div>
        <div class="card-footer d-flex align-items-center justify-content-between">
          <a class="small text-white stretched-link" href="/admin/topic">View Details</a>
          <div class="small text-white"><i class="fas fa-angle-right"></i></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
