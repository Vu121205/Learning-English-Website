{% extends "admin/base.html" %} {% block content %}

<main>
  <div class="container-fluid px-4">
    <h1 class="mt-4">Manage Topic</h1>
    <ol class="breadcrumb mb-4">
      <li class="breadcrumb-item"><a href="/admin">Dashboard</a></li>
      <li class="breadcrumb-item active">Update Topic</li>
    </ol>
    <div class="mt-5">
      <div class="row">
        <div class="col-md-6 col-12 mx-auto">
          <h3>Update a topic</h3>
          <hr />
          <form method="post" action="{{ url_for('topic.updateTopic', id=topic.id) }}" enctype="multipart/form-data">
            <div class="row">
              <!-- Hidden ID -->
              <input type="hidden" name="id" value="{{ topic.id }}" />

              <!-- Tên tiếng Việt -->
              <div class="mb-3 col-md-6 col-12">
                <label class="form-label">Tên chủ đề (Tiếng Việt)</label>
                <input type="text" name="name" class="form-control" value="{{ topic.name }}" required />
              </div>

              <!-- Tên tiếng Anh -->
              <div class="mb-3 col-md-6 col-12">
                <label class="form-label">Topic Name (English)</label>
                <input type="text" name="name_en" class="form-control" value="{{ topic.name_en }}" required />
              </div>

              <!-- Ảnh hiện tại -->
              <div class="mb-3 col-md-6 col-12">
                <label class="form-label">Ảnh hiện tại</label>
                <br />
                {% if topic.image %}
                <img src="{{ url_for('static', filename='uploads/topics/' + topic.image) }}" width="120" height="120" style="object-fit: cover" />
                {% else %}
                <p class="text-muted">Chưa có ảnh</p>
                {% endif %}
              </div>

              <!-- Upload ảnh mới -->
              <div class="mb-3 col-md-6 col-12">
                <label class="form-label">Chọn ảnh mới</label>
                <input type="file" name="image" class="form-control" />
              </div>

              <div class="col-12 mb-5">
                <button type="submit" class="btn btn-warning">Cập nhật</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

{% endblock %}
