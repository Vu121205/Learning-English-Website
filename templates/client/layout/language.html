<!-- Language -->
<div class="container py-5" id="topic">
  <h2 class="text-center mb-3" >Learn Vocabulary by Topics</h2>
  <p class="text-center text-muted mb-5">Choose a topic below to start learning new words.</p>

  <div class="row g-4" >
    {% for topic in topics %}
    <div class="col-lg-4 col-md-6">
      <a href="{{ url_for('homePage.vocabularyByTopic', id=topic.id) }}" class="topic-card d-flex align-items-center p-3">
        <div class="topic-image me-3">
          {% if topic.image %}
          <img src="{{ url_for('static', filename='uploads/topics/' ~ topic.image) }}" alt="{{ topic.name }}" />
          {% else %}
          <img src="{{ url_for('static', filename='images/default-topic.png') }}" alt="default" />
          {% endif %}
        </div>

        <div>
          <div class="fw-bold topic-title">{{ topic.name }}</div>
          <div class="text-muted small">{{ topic.name_en }}</div>
          <div class="text-secondary small mt-1">{{ topic.vocabularies|length }} words</div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
